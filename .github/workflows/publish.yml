name: Publish Extension

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run package
      - name: Publish to VS Code Marketplace
        run: bun run publish:marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
