name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          cache: bun
      - run: bun ci
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run compile
      - run: xvfb-run -a bun run test:coverage
